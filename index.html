<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Dog Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      overflow: hidden;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #load-error {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      padding:
        calc(24px + env(safe-area-inset-top, 0px))
        calc(24px + env(safe-area-inset-right, 0px))
        calc(24px + env(safe-area-inset-bottom, 0px))
        calc(24px + env(safe-area-inset-left, 0px));
      color: #fff;
      font: 16px/1.4 Arial, sans-serif;
      background: #111;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #pause-backdrop,
    #game-over-backdrop {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      z-index: 30;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #pause-backdrop[hidden],
    #pause-menu[hidden],
    #game-over-backdrop[hidden],
    #game-over-menu[hidden],
    #game-over-pet[hidden] {
      display: none !important;
    }

    #pause-menu,
    #game-over-menu {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      z-index: 32;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: none;
    }

    #game-over-pet {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      z-index: 31;
      pointer-events: none;
    }

    #game-over-pet[hidden] {
      display: none !important;
    }

    #game-over-pet-img {
      position: absolute;
      left: 20.8%;
      bottom: 5.4%;
      width: min(34vw, 163px);
      height: auto;
      transform: translate(-50%, 0);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
    }

    .pause-panel,
    .game-over-panel {
      position: relative;
      width: min(80vw, 300px);
      max-height: min(72vh, 918px);
      pointer-events: auto;
    }

    .pause-panel {
      aspect-ratio: 784 / 918;
    }

    .game-over-panel {
      aspect-ratio: 779 / 775;
      max-height: min(72vh, 775px);
    }

    .pause-panel-art,
    .game-over-panel-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .pause-hit,
    .game-over-hit {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .pause-hit:active,
    .game-over-hit:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .pause-hit-resume {
      left: 13.27%;
      top: 33.88%;
      width: 73.6%;
      height: 9.91%;
    }

    .pause-hit-retry {
      left: 1.4%;
      top: 52.29%;
      width: 96.94%;
      height: 10.89%;
    }

    .pause-hit-home {
      left: 12.76%;
      top: 74.07%;
      width: 74.49%;
      height: 9.8%;
    }

    .game-over-hit-retry {
      left: 2%;
      top: 43.5%;
      width: 96%;
      height: 9.5%;
    }

    .game-over-hit-home {
      left: 13%;
      top: 68.5%;
      width: 74%;
      height: 9.5%;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="pause-backdrop" hidden></div>
  <div id="pause-menu" hidden>
    <div class="pause-panel">
      <img
        id="pause-panel-img"
        class="pause-panel-art"
        src="/assets/ui/pause-panel.png"
        width="784"
        height="918"
        alt="Pause menu"
      />
      <button type="button" class="pause-hit pause-hit-resume" data-pause-action="resume" aria-label="Resume"></button>
      <button type="button" class="pause-hit pause-hit-retry" data-pause-action="retry" aria-label="Try Again"></button>
      <button type="button" class="pause-hit pause-hit-home" data-pause-action="home" aria-label="Back to Home"></button>
    </div>
  </div>
  <div id="game-over-backdrop" hidden></div>
  <div id="game-over-pet" hidden>
    <img id="game-over-pet-img" alt="" />
  </div>
  <div id="game-over-menu" hidden>
    <div class="game-over-panel">
      <img
        id="game-over-panel-img"
        class="game-over-panel-art"
        src="/assets/ui/game-over-panel.png"
        width="779"
        height="775"
        alt="Game over"
      />
      <button type="button" class="game-over-hit game-over-hit-retry" data-game-over-action="retry" aria-label="Try Again"></button>
      <button type="button" class="game-over-hit game-over-hit-home" data-game-over-action="home" aria-label="Back to Home"></button>
    </div>
  </div>
  <div id="load-error"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
