<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Dog Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      overflow: hidden;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #load-error {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      padding:
        calc(24px + env(safe-area-inset-top, 0px))
        calc(24px + env(safe-area-inset-right, 0px))
        calc(24px + env(safe-area-inset-bottom, 0px))
        calc(24px + env(safe-area-inset-left, 0px));
      color: #fff;
      font: 16px/1.4 Arial, sans-serif;
      background: #111;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #pause-backdrop {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      z-index: 30;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #pause-backdrop[hidden],
    #pause-menu[hidden] {
      display: none !important;
    }

    #pause-menu {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      z-index: 31;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: none;
    }

    .pause-panel {
      position: relative;
      width: min(80vw, 300px);
      aspect-ratio: 784 / 918;
      max-height: min(72vh, 918px);
      pointer-events: auto;
    }

    .pause-panel-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-drag: none;
    }

    #pause-panel-map area {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="pause-backdrop" hidden></div>
  <div id="pause-menu" hidden>
    <div class="pause-panel">
      <img
        id="pause-panel-img"
        class="pause-panel-art"
        src="/assets/ui/pause-panel.png"
        width="784"
        height="918"
        alt="Pause menu"
        usemap="#pause-panel-map"
      />
      <map name="pause-panel-map" id="pause-panel-map">
        <area
          shape="rect"
          coords="130,335,655,376"
          href="#"
          alt=""
          data-pause-action="resume"
        />
        <area
          shape="rect"
          coords="130,445,655,570"
          href="#"
          alt=""
          data-pause-action="retry"
        />
        <area
          shape="rect"
          coords="130,700,655,748"
          href="#"
          alt=""
          data-pause-action="home"
        />
      </map>
    </div>
  </div>
  <div id="load-error"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
